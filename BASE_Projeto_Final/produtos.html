<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produtos - Arca dos Bichos</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <header>
      <div class="header-container">
        <div class="header-brand">
          <h1>Arca dos Bichos</h1>
          <p>Produtos para pets com carinho e sabor brasileiro</p>
        </div>
        <nav class="main-nav">
          <a href="Index.html">Home</a>
          <a href="produtos.html">Produtos</a>
          <a href="pedidos.html">Pedidos</a>
          <a href="clientes.html">Clientes</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <h2>Novo Produto</h2>
      <form id="formProduto">
        <label>Nome do Produto:</label>
        <input type="text" id="nome" placeholder="Nome do Produto" required />
        <label>Preço do Produto:</label>
        <input
          type="number"
          id="preco"
          step="0.01"
          placeholder="Preço (Ex: 25.90)"
          required
        />
        <label>Estoque do Produto:</label>
        <input
          type="number"
          id="estoque"
          placeholder="Quantidade em Estoque"
          required
        />
        <button id="btnSalvar" type="submit">Cadastrar Produto</button>
        <button
          type="button"
          id="btnCancelar"
        >
          Cancelar
        </button>
      </form>

      <h3>Produtos</h3>
      <table border="1" id="tabelaProdutos">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </main>
  </body>
</html>
